openapi: 3.0.3
info:
  title: Sleep Tracker API
  description: REST API for tracking sleep data, user authentication, and Whoop device integration.
  version: 1.0.0

servers:
  - url: http://localhost:3333
    description: Local development server

components:
  securitySchemes:
    SessionToken:
      type: apiKey
      in: header
      name: X-Authorization
      description: Session token returned from login

  schemas:
    SleepEntry:
      type: object
      properties:
        id:
          type: integer
          example: 1
        whoop_record_id:
          type: string
          nullable: true
          example: "abc123"
        user_id:
          type: integer
          example: 1
        date:
          type: string
          format: date
          example: "2024-01-15"
        nap:
          type: boolean
          example: false
        bedtime:
          type: string
          format: date-time
          example: "2024-01-14T22:30:00.000Z"
        wake_time:
          type: string
          format: date-time
          example: "2024-01-15T07:00:00.000Z"
        total_in_bed_minutes:
          type: integer
          nullable: true
          example: 510
        total_sleep_duration_minutes:
          type: integer
          nullable: true
          example: 480
        light_sleep_minutes:
          type: integer
          nullable: true
          example: 150
        deep_sleep_minutes:
          type: integer
          nullable: true
          example: 90
        rem_sleep_minutes:
          type: integer
          nullable: true
          example: 120
        awake_minutes:
          type: integer
          nullable: true
          example: 30
        sleep_performance_score:
          type: integer
          nullable: true
          example: 85
        sleep_efficiency:
          type: integer
          nullable: true
          example: 90
        sleep_consistency:
          type: integer
          nullable: true
          example: 75
        respiratory_rate:
          type: number
          nullable: true
          example: 16.2
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateSleepRequest:
      type: object
      required:
        - date
        - bedtime
        - wake_time
      properties:
        whoop_record_id:
          type: string
          example: "abc123"
        date:
          type: string
          format: date
          example: "2024-01-15"
        nap:
          type: boolean
          example: false
        bedtime:
          type: string
          format: date-time
          example: "2024-01-14T22:30:00.000Z"
        wake_time:
          type: string
          format: date-time
          example: "2024-01-15T07:00:00.000Z"
        total_in_bed_minutes:
          type: integer
          minimum: 0
          example: 510
        total_sleep_duration_minutes:
          type: integer
          minimum: 0
          example: 480
        light_sleep_minutes:
          type: integer
          minimum: 0
          example: 150
        deep_sleep_minutes:
          type: integer
          minimum: 0
          example: 90
        rem_sleep_minutes:
          type: integer
          minimum: 0
          example: 120
        awake_minutes:
          type: integer
          minimum: 0
          example: 30
        sleep_performance_score:
          type: integer
          minimum: 0
          example: 85
        sleep_efficiency:
          type: integer
          minimum: 0
          example: 90
        sleep_consistency:
          type: integer
          minimum: 0
          example: 75
        respiratory_rate:
          type: number
          example: 16.2

    UpdateSleepRequest:
      type: object
      minProperties: 1
      properties:
        whoop_record_id:
          type: string
        date:
          type: string
          format: date
        nap:
          type: boolean
        bedtime:
          type: string
          format: date-time
        wake_time:
          type: string
          format: date-time
        total_in_bed_minutes:
          type: integer
          minimum: 0
        total_sleep_duration_minutes:
          type: integer
          minimum: 0
        light_sleep_minutes:
          type: integer
          minimum: 0
        deep_sleep_minutes:
          type: integer
          minimum: 0
        rem_sleep_minutes:
          type: integer
          minimum: 0
        awake_minutes:
          type: integer
          minimum: 0
        sleep_performance_score:
          type: integer
          minimum: 0
        sleep_efficiency:
          type: integer
          minimum: 0
        sleep_consistency:
          type: integer
          minimum: 0
        respiratory_rate:
          type: number

    CreateAccountRequest:
      type: object
      required:
        - first_name
        - last_name
        - email
        - password
      properties:
        first_name:
          type: string
          pattern: '^([^0-9]*)$'
          example: "John"
        last_name:
          type: string
          pattern: '^([^0-9]*)$'
          example: "Doe"
        email:
          type: string
          format: email
          example: "john.doe@example.com"
        password:
          type: string
          minLength: 8
          maxLength: 16
          description: Must contain uppercase, lowercase, number, and special character (!_@.#&+)
          example: "Password1!"

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: "john.doe@example.com"
        password:
          type: string
          minLength: 8
          maxLength: 16
          example: "Password1!"

    ErrorResponse:
      type: object
      properties:
        error_message:
          type: string
          example: "An error occurred"

paths:

  # ─── User ───────────────────────────────────────────────────────────────────

  /user/create_account:
    post:
      tags:
        - User
      summary: Create a new user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAccountRequest'
      responses:
        '201':
          description: Account created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: integer
                    example: 1
        '400':
          description: Validation error or email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                validation:
                  value: { error_message: '"first_name" is required' }
                duplicate:
                  value: { error_message: "Email already exists!" }
        '500':
          description: Internal server error

  /user/login:
    post:
      tags:
        - User
      summary: Log in and receive a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: integer
                    example: 1
                  session_token:
                    type: string
                    example: "a3f1c2d4e5b67890abcdef1234567890"
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Invalid email or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error_message: "Invalid email/password!"
        '500':
          description: Internal server error

  /user/logout:
    post:
      tags:
        - User
      summary: Log out the current user
      security:
        - SessionToken: []
      responses:
        '200':
          description: Logged out successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Successfully logged user out!"
        '401':
          description: Missing or invalid session token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error

  # ─── Sleep ──────────────────────────────────────────────────────────────────

  /sleep:
    get:
      tags:
        - Sleep
      summary: Get all sleep entries for the authenticated user
      security:
        - SessionToken: []
      parameters:
        - in: query
          name: start_date
          schema:
            type: string
            format: date
          description: Filter entries on or after this date
          example: "2024-01-01"
        - in: query
          name: end_date
          schema:
            type: string
            format: date
          description: Filter entries on or before this date
          example: "2024-01-31"
      responses:
        '200':
          description: List of sleep entries ordered by date descending
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SleepEntry'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorised
        '500':
          description: Internal server error

    post:
      tags:
        - Sleep
      summary: Create a new sleep entry
      security:
        - SessionToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSleepRequest'
      responses:
        '201':
          description: Sleep entry created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Successfully created sleep"
                  id:
                    type: integer
                    example: 42
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorised
        '500':
          description: Internal server error

  /sleep/{id}:
    get:
      tags:
        - Sleep
      summary: Get a specific sleep entry by ID
      security:
        - SessionToken: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Sleep entry found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SleepEntry'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorised
        '404':
          description: Sleep entry not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error_message: "Sleep not found"
        '500':
          description: Internal server error

    patch:
      tags:
        - Sleep
      summary: Update a sleep entry (partial update)
      security:
        - SessionToken: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSleepRequest'
      responses:
        '200':
          description: Sleep entry updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Successfully updated sleep"
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorised
        '404':
          description: Sleep entry not found
        '500':
          description: Internal server error

    delete:
      tags:
        - Sleep
      summary: Delete a sleep entry
      security:
        - SessionToken: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Sleep entry deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Successfully deleted sleep"
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorised
        '404':
          description: Sleep entry not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error_message: "Sleep not found"
        '500':
          description: Internal server error

  # ─── Whoop ──────────────────────────────────────────────────────────────────

  /whoop/connect:
    get:
      tags:
        - Whoop
      summary: Redirect to Whoop OAuth authorisation page
      description: Redirects the browser to Whoop's OAuth login. No auth required.
      responses:
        '302':
          description: Redirect to Whoop OAuth URL

  /whoop/callback:
    get:
      tags:
        - Whoop
      summary: OAuth callback — exchanges code for tokens
      description: Whoop redirects here after user authorises. Stores access and refresh tokens.
      parameters:
        - in: query
          name: code
          required: true
          schema:
            type: string
          description: Authorization code from Whoop OAuth
      responses:
        '200':
          description: Token stored successfully
          content:
            text/plain:
              schema:
                type: string
                example: "Token stored."
        '400':
          description: Missing authorization code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "Missing code"
        '500':
          description: Failed to store tokens

  /whoop/refresh:
    get:
      tags:
        - Whoop
      summary: Manually refresh the Whoop access token
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  refresh_token:
                    type: string
                  expires_in:
                    type: integer
        '401':
          description: No refresh token available
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "No refresh token"
        '500':
          description: Internal server error

  /whoop/sleep:
    get:
      tags:
        - Whoop
      summary: Sync sleep data from Whoop into the database
      description: Fetches sleep records from the Whoop API and upserts them into sleep_entries.
      parameters:
        - in: query
          name: range
          schema:
            type: string
            enum: [last-night, last-week, last-month]
            default: last-week
          description: Time range to sync
      responses:
        '200':
          description: Sync complete
          content:
            application/json:
              schema:
                type: object
                properties:
                  inserted:
                    type: integer
                    example: 7
        '401':
          description: Not authenticated with Whoop
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Not authenticated. Go to whoop/connect"
        '500':
          description: Internal server error

  /whoop/sleep-history:
    get:
      tags:
        - Whoop
      summary: Get all Whoop-synced sleep entries
      description: Returns all records from sleep_entries table (no auth required).
      responses:
        '200':
          description: List of all sleep entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SleepEntry'
        '500':
          description: Internal server error
